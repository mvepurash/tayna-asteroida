<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Тайна Астероида v3</title>
  <style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}

html {
  background: #000 !important;
}

html, body {
  width: 100%;
  height: 100%;
  background: #000;
  overflow: hidden;
  touch-action: none;
  display: flex;
  align-items: center;
  justify-content: center;
}

#game-wrapper {
  /* Строго 9:16 — никакого растяжения */
  position: relative;
  aspect-ratio: 9 / 16;
  /* Вписываем в экран не выходя за границы */
  width: min(100vw, calc(100vh * 9 / 16));
  height: auto;
  max-height: 100vh;
  flex-shrink: 0;
}

#game-canvas {
  width: 100%;
  height: 100%;
  display: block;
  image-rendering: crisp-edges;
  image-rendering: pixelated;
  outline: none;
  background: #0a0a12;
}

</style>
</head>
<body style="background:#000;margin:0;padding:0;">
  <div id="game-wrapper" style="background:#000;">
    <canvas id="game-canvas" style="background:#0a0a12;display:block;"></canvas>
  </div>
    <script src="js/config.js"></script>
  <script src="js/map.js"></script>
  <script src="js/crew.js"></script>
  <script src="js/save.js"></script>
  <script src="js/astronaut.js"></script>
  <script src="js/tentacles.js"></script>
  <script src="js/oxygen.js"></script>
  <script src="js/crystals.js"></script>
  <script src="js/hud.js"></script>
  <script src="js/renderer.js"></script>
  <script src="js/input.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/ui_manager.js"></script>
  <script src="js/game.js"></script>

</body>
</html>
